run:
  project_name: "feynrl-vlm"
  logger_type: "mlflow"
  tracking_uri: ""
  checkpoint_dir: "./ckps/vlm-rl/qwen2.5-vl-3b-instruct"
  training_gpus: 6
  rollout_gpus: 2
  ray_address: null
  ray_master_port: 29500
  seed: 42
  weight_sync_method: "direct"
  checkpoint_save_interval: 5
  nccl_socket_ifname: null
  nccl_ib_hca: null
  nccl_sync_port: null
  nccl_sync_backend: "gloo"
  init_timeout: 3600
  rollout_timeout: 3600
  train_step_timeout: 1800
  save_timeout: 1800
  sync_timeout: 900

overlap:
  enabled: false
  max_lag: null
  behave_imp_weight_cap: null

train:
  alg_name: "grpo"
  optimizer_name: "adamw"
  lr: 5.0e-6
  adam_epsilon: 1.0e-8
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.05
  clip_grad_norm: 1.0
  lr_scheduler: "WarmupCosineLR"
  total_number_of_epochs: 50
  train_steps_per_epoch: 1
  dynamic_ratio_every_step: false
  train_batch_size_per_gpu: 2
  gradient_accumulation_steps: 4
  val_batch_size_per_gpu: 4
  normalize_loss: true
  kl_coeff: 0.0
  clip_low: 0.2
  clip_high: 0.2
  entropy_coeff: 0.0
  update_after_full_replay: true

  tau: null
  gamma: null
  value_lr: null
  value_weight_decay: null
  value_clip_grad_norm: null

model:
  name: "Qwen/Qwen2.5-VL-3B-Instruct"
  dtype: "bfloat16"
  ref_model: ""
  ref_model_offload_to_cpu: true
  trust_remote_code: false
  model_class: "vlm"
  gradient_checkpointing: true
  attn_implementation: "flash_attention_2"
  value_model: ""

peft:
  use_peft: false
  peft_type: "lora"
  task_type: "CAUSAL_LM"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

reward:
  broadcast: true
  reward_func: math_verify_reward_func

rollout:
  temperature: 1.0
  max_tokens: 1024
  n_samples: 8
  top_p: 1.0
  top_k: -1
  ignore_eos: false
  stop: ""
  gpu_memory_utilization: 0.85
  stop_token_ids: []
  prompt_logprobs: false
  force_strict_on_policy: true
  tensor_parallel_size: 1
  rollout_batch_size_per_gpu: 4
  rollout_samples_per_epoch: 256
  batch_invariant: false
  max_model_len: 4096

data:
  train_ratios: {"mm_math_train": 1.0}
  train_files_path: ["./data/mm_math/mm_math_train.parquet"]
  val_files_path:   ["./data/mm_math/mm_math_val.parquet"]
  num_workers: 4
  max_seq_len: 4096
  prompt_key: "prompt"
  answer_key: "prompt"
  image_key: "image_bytes"
  max_image_pixels: 401408
  # math_verify_reward_func reads prompt_data["solution"]; solution col holds the short answer ("3").
  solution_key: "solution"

deepspeed:
  zero_optimization:
    stage: 2
    contiguous_gradients: true
    overlap_comm: true
    reduce_scatter: true
    reduce_bucket_size: "auto"
    allgather_bucket_size: "auto"
  prescale_gradients: false
  data_types:
    grad_accum_dtype: "fp32"
  steps_per_print: 10
  wall_clock_breakdown: false
  flops_profiler:
    enabled: false
    profile_step: 10
    module_depth: -1
    top_modules: 1
    detailed: true
    output_file: null
