run:
  project_name: "feynrl-vlm"
  logger_type: "mlflow"
  tracking_uri: ""
  checkpoint_dir: "./ckps/vlm-sft/qwen2.5-vl-3b-instruct"
  seed: 42
  checkpoint_save_interval: 1
  nccl_socket_ifname: null
  nccl_ib_hca: null

train:
  alg_name: "sft"
  optimizer_name: "adamw"
  lr: 1.0e-5
  adam_epsilon: 1.0e-8
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.05
  clip_grad_norm: 1.0
  lr_scheduler: "WarmupCosineLR"
  total_number_of_epochs: 5
  # mm_math_train has 5701 rows.
  # micro_batches_per_epoch = 5701 / (batch=2 × world_size=8) = ~356 → rounded to 360.
  # gradient_accumulation_steps=2 → 180 optimizer steps/epoch; effective batch = 2×2×8 = 32.
  micro_batches_per_epoch: 360
  dynamic_ratio_every_step: false
  train_batch_size_per_gpu: 2
  gradient_accumulation_steps: 2
  val_batch_size_per_gpu: 4
  normalize_loss: true

model:
  name: "Qwen/Qwen2.5-VL-3B-Instruct"
  dtype: "bfloat16"
  trust_remote_code: false
  model_class: "vlm"
  gradient_checkpointing: true
  attn_implementation: "flash_attention_2"

peft:
  use_peft: false
  peft_type: "lora"
  task_type: "CAUSAL_LM"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]

data:
  train_ratios: {"mm_math_train": 1.0}
  train_files_path: ["./data/mm_math/mm_math_train.parquet"]
  val_files_path:   ["./data/mm_math/mm_math_val.parquet"]
  num_workers: 4
  # Math solutions with LaTeX can be long; 4096 covers the vast majority.
  max_seq_len: 4096
  prompt_key: "prompt"
  # Train on the full worked solution (answer col), not just the short label (solution col).
  answer_key: "answer"
  image_key: "image_bytes"
  max_image_pixels: 401408

deepspeed:
  zero_optimization:
    stage: 2
    contiguous_gradients: true
    overlap_comm: true
    reduce_scatter: true
    reduce_bucket_size: "auto"
    allgather_bucket_size: "auto"
  prescale_gradients: false
  data_types:
    grad_accum_dtype: "fp32"
  steps_per_print: 50
  wall_clock_breakdown: false
  flops_profiler:
    enabled: false
    profile_step: 10
    module_depth: -1
    top_modules: 1
    detailed: true
    output_file: null
