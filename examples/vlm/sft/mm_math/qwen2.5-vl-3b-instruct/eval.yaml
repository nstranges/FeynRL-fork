run:
  experiment_id: "feynrl_vlm_sft_mm_math_{benchmark}"
  project_name: "feynrl-vlm-eval"
  logger_type: "mlflow"
  tracking_uri: ""
  checkpoint_dir: "./ckps/vlm-eval/sft/{benchmark}"
  rollout_gpus: 8
  seed: 42
  ray_address: null

reward:
  broadcast: false
  reward_func: math_verify_reward_func

rollout:
  temperature: 0.0
  max_tokens: 2048
  n_samples: 1
  top_p: 1.0
  top_k: -1
  ignore_eos: false
  stop: ""
  gpu_memory_utilization: 0.85
  stop_token_ids: []
  prompt_logprobs: false
  force_strict_on_policy: false
  tensor_parallel_size: 1
  rollout_batch_size_per_gpu: 4
  batch_invariant: true
  max_model_len: 4096

model:
  name: "./ckps/vlm-sft/qwen2.5-vl-3b-instruct/checkpoint"
  dtype: "bfloat16"
  trust_remote_code: false
  model_class: "vlm"

data:
  # Supported benchmarks: mm_math, geometry3k, mathvista
  test_files_path: "./data/{benchmark}_test.parquet"
  num_workers: 4
  max_seq_len: 4096
  prompt_key: "prompt"
  answer_key: "answer"
  solution_key: "solution"
  image_key: "image_bytes"
  max_image_pixels: 401408
