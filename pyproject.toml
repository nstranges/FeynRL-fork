[tool.pytest.ini_options]
addopts = "-q --disable-warnings --maxfail=1 --cov=. --cov-report=term-missing"
testpaths = ["tests"]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# Start conservative to avoid large refactors in initial OSS CI.
select = ["E9", "F63", "F7", "F82"]
