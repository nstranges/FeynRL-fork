run:
  experiment_name: "run_1"
  world_size: 1
  distributed_training_strategy: "deepspeed-zero3"
  seed: 42

train:
  ###############
  # optimizer related arguments
  ###############
  optimizer_name: "adamw"
  lr: 1e-5
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad_norm: 1.0
  lr_scheduler: "cosine"

  ###############
  # general training  loop arguments
  ###############
  # Here, an "epoch" is defined by a fixed number of training steps, not a full sweep of the dataset.
  # Each epoch processes: train_steps_per_epoch * global_batch_size samples.
  # We define epochs this way to control how different datasets are mixed during training and
  # to have more control over the training process.
  total_number_of_epochs: 30 # epochs means total number of time that we pass through the dataset.
  train_steps_per_epoch: 1000 # number of training steps per epoch
  dynamic_ratio_every_step: True # if True, we will recalculate the ratio of each dataset in every step
  ###############
  # Arguments which are common to both deepspeed and standalone training.
  ###############
  # Some of the below arguments also can be set in deepspeed config. However to avoid any confusion and increase code readability,
  # we are setting them here and update deepspeed config accordingly.
  # Note: train_batch_size_per_gpu is same as train_micro_batch_size_per_gpu
  # global batch_size would be train_batch_size_per_gpu * gradient_accumulation_steps * number_of_gpus.
  train_batch_size_per_gpu: 2 # this is batch size per gpu not node. This is same as train_micro_batch_size_per_gpu
  gradient_accumulation_steps: 1 # this is gradient accumulation
  val_batch_size_per_gpu: 16

model:
  name: "google/gemma-3-4b-it"
  dtype: "float16"
  ref_model: ""
  ref_model_device: "cpu"
  trust_remote_code: False
  use_cache: False

data:
  train_dnames: ["dataset1", "dataset2"]
  train_ratios: {"dataset1": 0.8, "dataset2": 0.2}
  train_files_path: ".//data/training/"
  val_files_path: ".//data/validation/"
  num_workers: 4
  max_seq_len: 512
  prompt_key: "prompt"
  answer_key: "answer"
 
deepspeed:
  config: "./ds_config.json"

inference_engine:
  name: "vllm"